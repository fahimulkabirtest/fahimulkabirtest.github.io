# For Netlify backend:
#   name: git-gateway
#   branch: main # Branch to update (optional; defaults to master)

# For Cloudflare backend:
# backend:
#   name: github
#   repo: ${CMS_REPO}
#   branch: main

backend:
  name: github
  repo: fahimulkabirtest/fahimulkabirtest.github.io
  branch: main
  auth_scope: repo
  base_url: https://fahimulkabir-academic-portfolio.vercel.app/
  auth_endpoint: api/auth

site_url: https://fahimulkabir-academic-portfolio.vercel.app/

media_folder: "public/uploads"
public_folder: "uploads"

collections:
  - name: "site_settings"
    label: "Site Settings"
    files:
      - file: "src/content/settings/site.md"
        label: "General Settings"
        name: "general"
        fields:
          - { label: "Site Title", name: "title", widget: "string" }

          - label: "Base URL"
            name: "baseUrl"
            widget: "string"
            hint: "https://yourdomain.edu"

          - label: "Your First Name"
            name: "yourFirstName"
            widget: "string"

          - label: "Your Last Name"
            name: "yourLastName"
            widget: "string"

          - label: "Navbar Display Name"
            name: "navbarTitle"
            widget: "string"
            required: true
            hint: "Shown as text logo"

          - label: "Allow Indexing"
            name: "allowIndexing"
            widget: "boolean"
            default: true

          - label: "Disallow Admin"
            name: "disallowAdmin"
            widget: "boolean"
            default: true

          - label: "Navigation: Show Publications"
            name: "showPublications"
            widget: "boolean"
            default: true
            required: false

          - label: "Navigation: Show Research"
            name: "showResearch"
            widget: "boolean"
            default: true
            required: false

          - label: "Navigation: Show Members"
            name: "showMembers"
            widget: "boolean"
            default: false
            required: false

          - label: "Navigation: Show Join Us"
            name: "showJoinUs"
            widget: "boolean"
            default: false
            required: false

  - name: "user"
    label: "Your Profile"
    files:
      - file: "src/content/user/profile.md"
        label: "User Info"
        name: "profile"
        fields:
          - { label: "Name", name: "name", widget: "string" }
          - { label: "Photo", name: "image", widget: "image", required: false }
          - label: "Resume / CV (PDF)"
            name: "cv"
            widget: "file"
            required: false
            media_types: ["application/pdf"]

          - label: "Google Scholar"
            name: "googleScholar"
            widget: "string"
            required: false

          - label: "ORCID"
            name: "orcid"
            widget: "string"
            required: false

          - label: "LinkedIn"
            name: "linkedin"
            widget: "string"
            required: false

          - label: "GitHub"
            name: "github"
            widget: "string"
            required: false

          - label: "Email"
            name: "email"
            widget: "string"
            required: false

          - { label: "Bio", name: "body", widget: "markdown" }

  - name: "publications"
    label: "Publications"
    folder: "src/content/publications"
    create: true
    slug: "{{year}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Authors", name: "authors", widget: "string" }
      - { label: "Venue", name: "venue", widget: "string", required: false }
      - { label: "Year", name: "year", widget: "number" }
      - {
          label: "Publication Link",
          name: "link",
          widget: "string",
          required: false,
        }
      - { label: "BibTeX", name: "bibtex", widget: "text", required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false }

  - name: "members"
    label: "Members"
    folder: "src/content/members"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Name", name: "name", widget: "string" }

      - label: "Position"
        name: "position"
        widget: "select"
        options: [Faculty, Postdoc, PhD, MS, Bachelors, Alumni]

      - { label: "Start Date", name: "startDate", widget: "string" }
      - {
          label: "End Date",
          name: "endDate",
          widget: "string",
          required: false,
        }

      - { label: "Photo", name: "photo", widget: "image", required: false }
      - { label: "Website", name: "website", widget: "string", required: false }
      - {
          label: "LinkedIn",
          name: "linkedin",
          widget: "string",
          required: false,
        }

      - { label: "Bio", name: "body", widget: "markdown" }

  - name: "research_overview"
    label: "Research Overview"
    files:
      - file: "src/content/research/overview.md"
        label: "Lab Overview"
        name: "overview"
        fields:
          - label: "Images"
            name: "images"
            widget: "list"
            field: { label: "Image", name: "image", widget: "image" }
          - label: "Content"
            name: "body"
            widget: "markdown"

  - name: "research_projects"
    label: "Research Projects"
    folder: "src/content/research/projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Image", name: "image", widget: "image" }
      - label: "Links"
        name: "links"
        widget: "list"
        required: false
        fields:
          - { label: "Label", name: "label", widget: "string" }
          - { label: "URL", name: "url", widget: "string" }
      - { label: "Description", name: "body", widget: "markdown" }

  - name: "news"
    label: "News & Updates"
    folder: "src/content/news"
    create: true
    identifier_field: title
    summary: "{{title}} — {{date | date('YYYY-MM-DD')}}"
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Update", name: "body", widget: "markdown" }

  - name: "openings"
    label: "Open Positions"
    files:
      - file: "src/content/join/join.md"
        label: "Edit Join Page"
        name: "join"
        fields:
          - {
              label: "Heading",
              name: "title",
              widget: "string",
              default: "Join Our Team",
            }
          - { label: "Message", name: "body", widget: "markdown" }
